services:
  functions-node-22:
    image: functions-node-22
    build:
      context: ../docker/functions-node-22
      dockerfile: ./Dockerfile
    command: /bin/true

  cosmosdb:
    image: cosmosdb
    env_file:
      - ./environments/generated/env.cosmosdb
    build:
      context: ../docker/cosmosdb
      dockerfile: ./Dockerfile
    ports:
      - "${COSMOSDB_PORT:-3000}:3000"

  storage-account:
    image: azurite
    build:
      context: ../docker/azurite
      dockerfile: ./Dockerfile
    ports:
      - 10000:10000
      - 10001:10001
      - 10002:10002

  fixtures:
    image: fixtures
    env_file:
      - ./environments/generated/env.io-fixtures
    build:
      context: ../docker/fixtures
      dockerfile: ./Dockerfile
    links:
      - storage-account
      - cosmosdb

  function:
    image: fn
    env_file:
      - ./environments/generated/env.io-functions-services
    build:
      context: ../../..
      dockerfile: apps/io-functions-services/docker/functions/Dockerfile
    ports:
      - "${FUNCTIONS_SERVICES_PORT:-7071}:7071"
    links:
      - cosmosdb
      - storage-account
    depends_on:
      - functions-node-22
      - fixtures

  testagent:
    image: node:22-alpine@sha256:8094c002d08262dba12645a3b4a15cd6cd627d30bc782f53229a2ec13ee22a00
    container_name: fn_services_testagent
    working_dir: /usr/src/app
    command: tail -f /dev/null # to keep it   up&running
    env_file:
      - environments/generated/env.integration-tests
    ports:
      - "${APIM_PORT:-3443}:${APIM_PORT:-3443}"
    volumes:
      - "./:/usr/src/app"
      - "../__mocks__:/usr/src/__mocks__"
      - "../node_modules:/usr/src/node_modules"
      - "../generated:/usr/src/generated"
      - "../openapi:/usr/src/openapi"
    depends_on:
      - cosmosdb
      - storage-account
      - fixtures
    links:
      - function
