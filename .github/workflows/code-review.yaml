name: Code Review

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]
    paths:
      - apps/**
      - packages/**
      - .node-version
      - package.json
      - turbo.json
      - .github/workflows/code-review.yaml

permissions:
  contents: read

jobs:
  js_code_review:
    uses: pagopa/dx/.github/workflows/js_code_review.yaml@main
    name: Code Review
    secrets: inherit

  integration_tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: js_code_review

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version

      - name: Enable Corepack
        run: corepack enable

      - name: Configure the monorepo for integration testing
        run: |
          yarn install --frozen-lockfile
          yarn build

      - name: Install integration test dependencies
        working-directory: apps/io-functions-services/__integrations__
        run: |
          cp environments/env.base environments/.env
          yarn install
          yarn generate:models:services

      - name: Start integration stack
        working-directory: apps/io-functions-services/__integrations__
        run: yarn start

      - name: Run integration tests
        working-directory: apps/io-functions-services/__integrations__
        run: yarn test

      - name: Tear down integration stack
        if: always()
        working-directory: apps/io-functions-services/__integrations__
        run: yarn stop
